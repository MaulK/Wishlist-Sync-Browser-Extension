<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist Sync</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="popup">
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <img src="icons/icon48.png" alt="Wishlist Sync" class="logo-icon">
        <h1>Wishlist Sync</h1>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="icon-btn" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"></path>
            <path d="M1 20v-6h6"></path>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Current Page Status -->
    <div id="pageStatus" class="page-status">
      <span class="status-icon">🔍</span>
      <span class="status-text">Detecting page...</span>
    </div>

    <!-- Add Current Item -->
    <div id="addItemSection" class="add-item-section hidden">
      <div class="item-preview" id="itemPreview">
        <img id="previewImage" src="" alt="" class="preview-image">
        <div class="preview-info">
          <h3 id="previewTitle" class="preview-title">Item Title</h3>
          <div class="preview-price">
            <span id="previewPrice" class="current-price">$0.00</span>
            <span id="previewOriginalPrice" class="original-price hidden">$0.00</span>
          </div>
        </div>
      </div>
      <button id="addToWishlistBtn" class="btn btn-primary btn-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
          </path>
        </svg>
        Add to Wishlist
      </button>
    </div>

    <!-- Stats Summary -->
    <div class="stats-summary">
      <div class="stat-item">
        <span class="stat-value" id="totalItems">0</span>
        <span class="stat-label">Items</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="totalValue">$0</span>
        <span class="stat-label">Value</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="totalSavings">$0</span>
        <span class="stat-label">Savings</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="priceDrops">0</span>
        <span class="stat-label">Drops</span>
      </div>
    </div>

    <!-- Recent Items -->
    <div class="recent-items">
      <div class="section-header">
        <h2>Recent Items</h2>
        <button id="viewAllBtn" class="link-btn">View All</button>
      </div>
      <div id="recentItemsList" class="items-list">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
            </path>
          </svg>
          <p>No items in your wishlist yet</p>
          <p class="hint">Browse supported shopping sites to add items</p>
        </div>
      </div>
    </div>

    <!-- Footer Actions -->
    <footer class="popup-footer">
      <button id="openDashboardBtn" class="btn btn-secondary btn-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        Open Dashboard
      </button>
    </footer>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden">
    <span id="toastMessage"></span>
    <button id="toastClose" class="toast-close">&times;</button>
  </div>

  <script src="utils.js"></script>
  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>

</html>
