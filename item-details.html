<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - Wishlist Sync</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="item-details">
    <div class="details-container">
        <!-- Header -->
        <header class="details-header">
            <button id="backBtn" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Back to Dashboard
            </button>
            <div class="header-actions">
                <button id="refreshBtn" class="icon-btn" title="Refresh Price">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
                <button id="editBtn" class="icon-btn" title="Edit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>
                <button id="deleteBtn" class="icon-btn" title="Delete">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Loading item details...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-state hidden">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <h2>Item Not Found</h2>
            <p>The item you're looking for doesn't exist or has been deleted.</p>
            <button id="backToDashboardBtn" class="btn btn-primary">Back to Dashboard</button>
        </div>

        <!-- Item Details -->
        <div id="itemDetails" class="item-details-content hidden">
            <!-- Main Info -->
            <section class="item-main-info">
                <div class="item-image-section">
                    <img id="itemImage" src="" alt="" class="item-image-large">
                    <a id="itemLink" href="" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-full">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                        View on Site
                    </a>
                </div>
                <div class="item-info-section">
                    <div class="item-site-badge" id="itemSiteBadge"></div>
                    <h1 id="itemTitle" class="item-title-large"></h1>
                    <p id="itemUrl" class="item-url"></p>

                    <div class="item-price-large">
                        <span id="itemPrice" class="price-current"></span>
                        <span id="itemOriginalPrice" class="price-original"></span>
                        <span id="itemDiscount" class="price-discount"></span>
                    </div>

                    <div class="item-meta-large">
                        <div class="meta-item">
                            <span class="meta-label">Added:</span>
                            <span id="itemAddedDate" class="meta-value"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Last Checked:</span>
                            <span id="itemLastChecked" class="meta-value"></span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Availability:</span>
                            <span id="itemAvailability" class="meta-value availability-badge"></span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Price History Chart -->
            <section class="price-history-section">
                <div class="section-header">
                    <h2>Price History</h2>
                    <button id="checkPriceBtn" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        Check Current Price
                    </button>
                </div>
                <div id="priceChart" class="price-chart">
                    <canvas id="priceChartCanvas"></canvas>
                </div>
                <div id="priceHistoryEmpty" class="empty-state hidden">
                    <p>No price history available</p>
                </div>
            </section>

            <!-- Notes & Tags -->
            <section class="notes-tags-section">
                <div class="section">
                    <h3>Notes</h3>
                    <div id="itemNotes" class="notes-content"></div>
                    <button id="editNotesBtn" class="link-btn">Edit Notes</button>
                </div>
                <div class="section">
                    <h3>Tags</h3>
                    <div id="itemTags" class="tags-content"></div>
                    <button id="editTagsBtn" class="link-btn">Edit Tags</button>
                </div>
            </section>

            <!-- Category -->
            <section class="category-section">
                <h3>Category</h3>
                <div class="category-select">
                    <span id="itemCategory" class="category-badge"></span>
                    <button id="changeCategoryBtn" class="link-btn">Change</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Edit Notes Modal -->
    <div id="editNotesModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Notes</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="notesInput" rows="6" placeholder="Add your notes here..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary cancel-btn">Cancel</button>
                <button id="saveNotesBtn" class="btn btn-primary">Save Notes</button>
            </div>
        </div>
    </div>

    <!-- Edit Tags Modal -->
    <div id="editTagsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Tags</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="tagsInput" placeholder="Enter tags separated by commas">
                <p class="form-hint">Example: birthday, wishlist, urgent</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary cancel-btn">Cancel</button>
                <button id="saveTagsBtn" class="btn btn-primary">Save Tags</button>
            </div>
        </div>
    </div>

    <!-- Change Category Modal -->
    <div id="changeCategoryModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Change Category</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <select id="categorySelect">
                    <option value="Uncategorized">Uncategorized</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Home">Home</option>
                    <option value="Books">Books</option>
                    <option value="Sports">Sports</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Toys">Toys</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary cancel-btn">Cancel</button>
                <button id="saveCategoryBtn" class="btn btn-primary">Save Category</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span id="toastMessage"></span>
        <button id="toastClose" class="toast-close">&times;</button>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="utils.js"></script>
    <script src="storage.js"></script>
    <script src="item-details.js"></script>
</body>

</html>
